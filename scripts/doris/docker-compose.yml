services:
  doris-fe:
    image: apache/doris:fe-2.1.7
    container_name: doris-fe
    hostname: doris-fe
    environment:
      - FE_SERVERS=fe1:doris-fe:9010
      - FE_ID=1
    ports:
      - "8030:8030"
      - "9030:9030"
    healthcheck:
      test: ["CMD-SHELL", "mysql -h127.0.0.1 -P9030 -uroot -e 'SHOW FRONTENDS;' >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 30

  doris-be:
    image: apache/doris:be-2.1.7
    container_name: doris-be
    hostname: doris-be
    environment:
      - FE_SERVERS=fe1:doris-fe:9010
      - BE_ADDR=doris-be:9050
    depends_on:
      doris-fe:
        condition: service_healthy
    ports:
      - "8040:8040"
