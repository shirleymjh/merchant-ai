networks:
  custom_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.22.80.0/24

services:
  fe:
    image: apache/doris:fe-4.1.0
    hostname: fe
    mem_limit: 6g
    entrypoint:
      - bash
      - -lc
      - |
        sed -i 's/-Xmx8192m -Xms8192m/-Xmx4096m -Xms2048m/' /opt/apache-doris/fe/conf/fe.conf
        exec /usr/local/bin/init_fe.sh
    ports:
      - 8030:8030
      - 9030:9030
      - 9010:9010
    environment:
      - FE_SERVERS=fe1:172.22.80.2:9010
      - FE_ID=1
    networks:
      custom_network:
        ipv4_address: 172.22.80.2

  be:
    image: apache/doris:be-4.1.0
    hostname: be
    mem_limit: 5g
    ports:
      - 8040:8040
      - 9050:9050
    environment:
      - FE_SERVERS=fe1:172.22.80.2:9010
      - BE_ADDR=172.22.80.3:9050
    depends_on:
      - fe
    networks:
      custom_network:
        ipv4_address: 172.22.80.3
