services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.0.0
    container_name: merchant-ai-es
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms1g -Xmx1g
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9200 >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20

  kibana:
    image: docker.elastic.co/kibana/kibana:9.0.0
    container_name: merchant-ai-kibana
    environment:
      ELASTICSEARCH_HOSTS: '["http://elasticsearch:9200"]'
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "5601:5601"

  elasticsearch-init:
    image: curlimages/curl:8.12.1
    depends_on:
      elasticsearch:
        condition: service_healthy
    command:
      - /bin/sh
      - -ec
      - |
        curl -fsS -X PUT http://elasticsearch:9200/_index_template/single-node-defaults -H 'Content-Type: application/json' -d '{"index_patterns":["*"],"priority":1,"template":{"settings":{"number_of_replicas":0}}}'
        curl -fsS -X PUT http://elasticsearch:9200/_all/_settings -H 'Content-Type: application/json' -d '{"index":{"number_of_replicas":0}}'
