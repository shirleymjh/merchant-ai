<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="980" viewBox="0 0 1280 980">
  <style>
    .bg { fill: #f7f8fb; }
    .frame { fill: #ffffff; stroke: #1f2937; stroke-width: 2.5; }
    .layer { fill: #ffffff; stroke: #1f2937; stroke-width: 2; }
    .box { fill: #f9fafb; stroke: #1f2937; stroke-width: 2; rx: 8; }
    .agent { fill: #eef6ff; stroke: #2563eb; stroke-width: 2; rx: 8; }
    .data { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2; rx: 8; }
    .ops { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 8; }
    .title { font: 700 30px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #111827; }
    .layer-title { font: 700 22px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #111827; }
    .text { font: 600 18px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #111827; }
    .sub { font: 500 15px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #374151; }
    .tiny { font: 500 13px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #4b5563; }
    .arrow { stroke: #6b7280; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7280"/>
    </marker>
  </defs>

  <rect class="bg" width="1280" height="980"/>
  <rect class="frame" x="36" y="32" width="1208" height="916" rx="12"/>
  <text class="title" x="640" y="82" text-anchor="middle">商家 AI 助手多智能体 BI 问答架构</text>

  <!-- Access layer -->
  <rect class="layer" x="70" y="112" width="1140" height="135" rx="10"/>
  <text class="layer-title" x="98" y="152">多渠道接入层</text>
  <text class="sub" x="98" y="178">承接商家提问、经营日报推送和外部系统调用</text>
  <rect class="box" x="125" y="196" width="180" height="34"/>
  <text class="text" x="215" y="219" text-anchor="middle">商家工作台</text>
  <rect class="box" x="350" y="196" width="180" height="34"/>
  <text class="text" x="440" y="219" text-anchor="middle">Web 后台</text>
  <rect class="box" x="575" y="196" width="180" height="34"/>
  <text class="text" x="665" y="219" text-anchor="middle">API 接口</text>
  <rect class="box" x="800" y="196" width="220" height="34"/>
  <text class="text" x="910" y="219" text-anchor="middle">经营日报推送</text>

  <!-- Agent layer -->
  <rect class="layer" x="70" y="275" width="1140" height="300" rx="10"/>
  <text class="layer-title" x="98" y="315">智能体编排层（LangGraph / ReAct）</text>
  <text class="sub" x="98" y="341">主智能体根据 State 动态决策，子智能体按职责隔离执行</text>

  <rect class="agent" x="105" y="370" width="235" height="72"/>
  <text class="text" x="222" y="397" text-anchor="middle">主智能体</text>
  <text class="sub" x="222" y="422" text-anchor="middle">路由 / 调度 / 观察 / 反思</text>

  <rect class="agent" x="375" y="370" width="235" height="72"/>
  <text class="text" x="492" y="397" text-anchor="middle">知识智能体</text>
  <text class="sub" x="492" y="422" text-anchor="middle">ES 召回 / 资产按需读取</text>

  <rect class="agent" x="645" y="370" width="235" height="72"/>
  <text class="text" x="762" y="397" text-anchor="middle">规划智能体</text>
  <text class="sub" x="762" y="422" text-anchor="middle">问题结构理解 / 查询图生成</text>

  <rect class="agent" x="915" y="370" width="235" height="72"/>
  <text class="text" x="1032" y="397" text-anchor="middle">计划反思智能体</text>
  <text class="sub" x="1032" y="422" text-anchor="middle">图校验 / 缺口定位</text>

  <rect class="agent" x="240" y="475" width="235" height="72"/>
  <text class="text" x="357" y="502" text-anchor="middle">节点执行智能体</text>
  <text class="sub" x="357" y="527" text-anchor="middle">SQL 生成 / Doris 查询</text>

  <rect class="agent" x="510" y="475" width="235" height="72"/>
  <text class="text" x="627" y="502" text-anchor="middle">证据校验智能体</text>
  <text class="sub" x="627" y="527" text-anchor="middle">字段口径 / 0 行 / SQL 失败</text>

  <rect class="agent" x="780" y="475" width="235" height="72"/>
  <text class="text" x="897" y="502" text-anchor="middle">回答智能体</text>
  <text class="sub" x="897" y="527" text-anchor="middle">基于已验证证据回答</text>

  <path class="arrow" d="M340 406 H370"/>
  <path class="arrow" d="M610 406 H640"/>
  <path class="arrow" d="M880 406 H910"/>
  <path class="arrow" d="M1032 442 C1032 470 1010 500 1015 511"/>
  <path class="arrow" d="M780 511 H750"/>
  <path class="arrow" d="M510 511 H480"/>

  <!-- Knowledge layer -->
  <rect class="layer" x="70" y="603" width="1140" height="165" rx="10"/>
  <text class="layer-title" x="98" y="643">知识与语义服务层</text>
  <text class="sub" x="98" y="669">用业务语义约束模型，避免直接面对原始物理 schema</text>

  <rect class="data" x="105" y="695" width="160" height="46"/>
  <text class="text" x="185" y="724" text-anchor="middle">商家画像</text>
  <rect class="data" x="295" y="695" width="160" height="46"/>
  <text class="text" x="375" y="724" text-anchor="middle">经营记忆</text>
  <rect class="data" x="485" y="695" width="160" height="46"/>
  <text class="text" x="565" y="724" text-anchor="middle">Topic 资产</text>
  <rect class="data" x="675" y="695" width="160" height="46"/>
  <text class="text" x="755" y="724" text-anchor="middle">语义层</text>
  <rect class="data" x="865" y="695" width="160" height="46"/>
  <text class="text" x="945" y="724" text-anchor="middle">规则知识</text>
  <rect class="data" x="1055" y="695" width="120" height="46"/>
  <text class="text" x="1115" y="724" text-anchor="middle">ES 索引</text>

  <!-- Data execution layer -->
  <rect class="layer" x="70" y="796" width="1140" height="80" rx="10"/>
  <text class="layer-title" x="98" y="834">数据执行层</text>
  <rect class="box" x="285" y="817" width="190" height="38"/>
  <text class="text" x="380" y="842" text-anchor="middle">Doris 明细宽表</text>
  <rect class="box" x="510" y="817" width="190" height="38"/>
  <text class="text" x="605" y="842" text-anchor="middle">SQL Validator</text>
  <rect class="box" x="735" y="817" width="210" height="38"/>
  <text class="text" x="840" y="842" text-anchor="middle">派生指标本地计算</text>

  <!-- Ops layer -->
  <rect class="layer" x="70" y="900" width="1140" height="34" rx="10"/>
  <text class="layer-title" x="98" y="924">观测治理层</text>
  <text class="tiny" x="255" y="923">Trace Replay / Run Event / Checkpoint / Artifact / 性能监控 / 用户反馈 / 知识沉淀闭环</text>

  <!-- vertical arrows -->
  <path class="arrow" d="M640 247 V274"/>
  <path class="arrow" d="M640 575 V602"/>
  <path class="arrow" d="M640 768 V795"/>
  <path class="arrow" d="M640 876 V899"/>
</svg>
